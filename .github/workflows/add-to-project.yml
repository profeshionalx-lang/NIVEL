name: Add issue to All Projects Board

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/profeshionalx-lang/projects/3
          github-token: ${{ secrets.PROJECTS_TOKEN }}
